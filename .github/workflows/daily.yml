name: Daily Podcast
on:
  schedule:
    - cron: '0 11 * * *'   # 7:00 AM ET (11:00 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node build.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit episode
        run: |
          git config user.name "podcast-bot"
          git config user.email "bot@users.noreply.github.com"
          git add episodes/
          git diff --cached --quiet || git commit -m "Episode $(date -u +%Y-%m-%d)"
          git push
