name: Daily Sports Podcast
on:
  schedule:
    - cron: '30 9 * * *'    # ~5:30 AM EDT — primary
    - cron: '0 10 * * *'    # ~6:00 AM EDT — backup
    - cron: '23 11 * * *'   # ~7:23 AM EDT — final safety net
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if today's episode already exists
        run: |
          if git ls-files episodes/ | grep -q "$(date -u +%Y-%m-%d).txt"; then
            echo "Episode for today already committed. Exiting."
            exit 0
          fi

      - name: Generate episode
        id: gen
        run: |
          node build.mjs
          echo "DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "LONGDATE=$(date -u '+%A, %B %-d, %Y')" >> $GITHUB_OUTPUT
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit episode to repo
        run: |
          git config user.name "podcast-bot"
          git config user.email "bot@users.noreply.github.com"
          git add episodes/
          git diff --cached --quiet || git commit -m "Episode ${{ steps.gen.outputs.DATE }}"
          git push

      - name: Email episode
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Ryan's Sports Podcast <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "🎙️ Daily Sports Podcast — ${{ steps.gen.outputs.LONGDATE }}"
          body: |
            Your Philly-first daily sports recap is ready.

            To listen: tap the attachment below, hit Share, choose ElevenReader.
            It'll land in your library ready to play.
          attachments: episodes/${{ steps.gen.outputs.DATE }}.txt
